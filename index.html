```html
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">

    <title>Canivilu - Tech Chihuahua</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-glow { text-shadow: 0 0 15px rgba(34, 211, 238, 0.5); }
        
        .bg-grid {
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .slide-enter {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide-active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Ocultar barra de rolagem */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }
        .animate-pulse-soft { animation: pulse-soft 3s infinite ease-in-out; }
    </style>
</head>
<body class="text-slate-200 m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel" data-type="module">

          Hammer, CheckCircle, ShieldCheck, BatteryCharging, Heart,

        // --- Componentes de Seção ---

        const SectionHero = ({ goToPrecos, goToSolucao }) => (

            <div className="max-w-7xl w-full mx-auto grid md:grid-cols-2 gap-8 items-center relative z-10">
              <div className="text-center md:text-left">
                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-cyan-950/40 border border-cyan-500/30 text-cyan-400 text-xs font-bold tracking-widest mb-6 uppercase">
                  <Sparkles size={14} className="animate-spin" /> Tecnologia de Ponta
                </div>
                <h1 className="text-4xl sm:text-6xl lg:text-8xl font-extrabold mb-6 leading-tight tracking-tighter text-white">
                  Tech <span className="text-cyan-400 text-glow">Chihuahua</span>
                </h1>
                <p className="text-base sm:text-lg lg:text-2xl text-slate-300 mb-8 leading-relaxed max-w-xl">
                  A ferramenta profissional disfarçada de pet adorável. Alta produtividade com o máximo de fofura.
                </p>
                <div className="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                  <button onClick={goToPrecos} className="px-8 py-4 rounded-2xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold text-lg transition-all shadow-[0_0_30px_rgba(34,211,238,0.3)] flex items-center justify-center gap-2 group">
                    Garantir o meu <ChevronRight size={20} className="group-hover:translate-x-1 transition-transform" />
                  </button>
                  <button onClick={goToSolucao} className="px-8 py-4 rounded-2xl border border-white/10 hover:border-cyan-500/50 hover:bg-white/5 font-semibold text-lg transition-all glass-panel">
                    Descobrir Como
                  </button>
                </div>
              </div>
              
              <div className="flex justify-center md:justify-end">
                <div className="relative w-64 h-64 lg:w-[450px] lg:h-[450px]">

                  <img 
                    src="https://raw.githubusercontent.com/strongestrotiv/Jotgin/refs/heads/main/cb4513a3-8143-43c8-98ad-789ef3025e5f.jfif"

        );

        const SectionProblema = () => (
          <section className="w-full h-full flex flex-col justify-center bg-slate-950 px-6 md:px-16">
            <div className="max-w-6xl w-full mx-auto">
              <div className="text-center mb-10">
                <AlertTriangle className="text-red-500 mx-auto mb-4 animate-pulse" size={48} />

                <p className="text-lg text-slate-400 max-w-2xl mx-auto">Profissionais de excelência perdem horas em tarefas repetitivas que um Chihuahua inteligente resolve em segundos.</p>
              </div>

              <div className="grid md:grid-cols-2 gap-8 items-center">
                <div className="glass-panel p-8 md:p-12 rounded-[40px] border-red-500/20 shadow-2xl">
                  <ul className="space-y-6">
                    {[
                      "Correções de provas que duram o fim de semana todo.",
                      "Medições manuais lentas e cheias de erros.",
                      "Solidão no ambiente de trabalho técnico."
                    ].map((text, i) => (
                      <li key={i} className="flex items-start gap-4">
                        <div className="mt-1 bg-red-500/10 p-2 rounded-full"><Clock className="text-red-400" size={20} /></div>
                        <span className="text-lg text-slate-300">{text}</span>
                      </li>
                    ))}
                  </ul>
                </div>
                <div className="relative group rounded-[40px] overflow-hidden border border-white/10 aspect-video md:aspect-auto md:h-[400px]">
                  <img src="https://raw.githubusercontent.com/strongestrotiv/Jotgin/refs/heads/main/WhatsApp%20Image%202026-04-07%20at%2009.23.14%20(1).jpeg" className="w-full h-full object-cover grayscale transition-all duration-1000 group-hover:grayscale-0 group-hover:scale-105" />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex items-end p-8">
                    <p className="text-red-400 font-bold tracking-widest text-xl">STATUS: EXAUSTO</p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        );

        const SectionProfessores = () => (
          <section className="w-full h-full flex flex-col justify-center bg-slate-900 px-6 md:px-16 overflow-hidden">
            <div className="max-w-6xl w-full mx-auto grid md:grid-cols-2 gap-12 items-center">
              <div className="order-2 md:order-1 flex justify-center">
                <div className="relative w-full max-w-sm aspect-square glass-panel p-4 rounded-[50px] border-blue-500/30">
                  <img src="https://raw.githubusercontent.com/strongestrotiv/Jotgin/refs/heads/main/Chihuahua_professor_dando_aula_estudando_e.gif" className="w-full h-full object-cover rounded-[40px]" />
                  <div className="absolute -top-6 -right-6 bg-blue-500 p-4 rounded-2xl shadow-xl animate-float">
                    <GraduationCap className="text-white" size={32} />
                  </div>
                </div>
              </div>
              <div className="order-1 md:order-2">
                <h2 className="text-4xl md:text-6xl font-bold mb-6">Mestre da Classe</h2>
                <p className="text-xl text-slate-300 mb-8 leading-relaxed">
                  Automatize a correção de provas e ganhe tempo para o que importa: ensinar. Seus alunos vão adorar o novo "monitor".
                </p>
                <div className="grid gap-4">
                  <div className="glass-panel p-6 rounded-3xl border-white/5 hover:border-blue-500/30 transition-all">
                    <h4 className="text-blue-400 font-bold flex items-center gap-2 mb-2"><Eye size={20}/> Scanner Corretor</h4>

                  </div>

                    <h4 className="text-blue-400 font-bold flex items-center gap-2 mb-2"><BookOpen size={20}/> Suporte ao Aluno</h4>

            </div>

        const SectionMarceneiros = () => (
          <section className="w-full h-full flex flex-col justify-center bg-slate-950 px-6 md:px-16">
            <div className="max-w-6xl w-full mx-auto grid md:grid-cols-2 gap-12 items-center">
              <div>
                <h2 className="text-4xl md:text-6xl font-bold mb-6 text-amber-400">Casca Grossa</h2>
                <p className="text-xl text-slate-300 mb-8 leading-relaxed">
                  Construído para a oficina. Resistente a pó, quedas e pronto para medir qualquer projeto com precisão laser.
                </p>
                <div className="space-y-4">
                  <div className="flex gap-4 items-center glass-panel p-6 rounded-3xl border-amber-500/20">
                    <Ruler className="text-amber-500" size={32} />
                    <div>
                      <h4 className="font-bold text-white">Trena Laser Ocular</h4>
                      <p className="text-slate-400">Precisão de 0.1mm com envio direto para o app.</p>
                    </div>
                  </div>
                  <div className="flex gap-4 items-center glass-panel p-6 rounded-3xl border-amber-500/20">
                    <ShieldCheck className="text-amber-500" size={32} />
                    <div>
                      <h4 className="font-bold text-white">Certificação Industrial</h4>
                      <p className="text-slate-400">Blindagem contra serragem e respingos químicos.</p>
                    </div>
                  </div>
                </div>
              </div>
              <div className="flex justify-center">
                <div className="relative group">
                  <div className="absolute inset-0 bg-amber-500/20 blur-3xl rounded-full scale-75 group-hover:scale-100 transition-all"></div>
                  <img src="https://raw.githubusercontent.com/strongestrotiv/Jotgin/refs/heads/main/Chihuahua_marceneiro_cerrando_martelando_co.gif" className="relative w-full max-w-sm aspect-square object-cover rounded-[100px] border-4 border-amber-500/30 shadow-2xl" />
                </div>
              </div>
            </div>
          </section>
        );

        const SectionBrainUpgrade = () => (
          <section className="w-full h-full flex flex-col justify-center bg-gradient-to-br from-slate-950 to-purple-950/30 px-6 md:px-16">
            <div className="max-w-5xl w-full mx-auto text-center">
              <h2 className="text-4xl md:text-7xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400">
                Upgrade Cerebral
              </h2>
              <div className="glass-panel p-8 md:p-12 rounded-[50px] border-purple-500/20 relative overflow-hidden">
                <div className="flex flex-col md:flex-row items-center gap-12">
                  <div className="relative">
                    <div className="w-48 h-48 md:w-64 md:h-64 rounded-full border-4 border-purple-500/40 p-2 animate-[spin_15s_linear_infinite]">
                      <div className="w-full h-full rounded-full border-4 border-dashed border-purple-300"></div>
                    </div>
                    <img src="https://raw.githubusercontent.com/strongestrotiv/Jotgin/refs/heads/main/WhatsApp%20Image%202026-04-07%20at%2009.23.14.jpeg" className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 md:w-56 md:h-56 object-cover rounded-full shadow-2xl" />
                  </div>
                  <div className="text-left flex-1">
                    <h3 className="text-2xl md:text-4xl font-bold mb-4">Coleira Smart Link</h3>
                    <p className="text-lg text-slate-300 mb-6">Já tem um Chihuahua? Transforme-o em um gênio. A coleira traduz sinais vitais e latidos em dados úteis de produtividade.</p>
                    <div className="flex flex-wrap gap-4">
                      <span className="px-4 py-2 rounded-full bg-purple-500/20 text-purple-300 text-sm font-bold border border-purple-500/30">Instalação em 2 min</span>
                      <span className="px-4 py-2 rounded-full bg-purple-500/20 text-purple-300 text-sm font-bold border border-purple-500/30">App Incluso</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        );

        const SectionPrecos = () => (
          <section className="w-full h-full flex flex-col justify-center bg-grid px-6 md:px-16 py-12 overflow-y-auto hide-scrollbar">
            <div className="max-w-6xl w-full mx-auto">
              <h2 className="text-4xl md:text-6xl font-bold text-center mb-16 md:mb-20">Investimento</h2>
              <div className="grid md:grid-cols-3 gap-6 md:gap-8 items-stretch pt-4 md:pt-8">
                {[
                  { title: "Coleira Smart", price: "299", installment: "24,91", color: "purple", features: ["Tradução de latidos", "Monitor de Saúde", "GPS Integrado"] },
                  { title: "Edu Edition", price: "899", installment: "74,91", color: "cyan", popular: true, features: ["Scanner de Provas", "Módulo Aula", "Interação Vocal"] },
                  { title: "Maker Edition", price: "1.199", installment: "99,91", color: "amber", features: ["Resistência IP68", "Trena Laser", "Projetor HUD"] }
                ].map((plan, i) => (
                  <div key={i} className={`glass-panel p-8 rounded-[40px] flex flex-col border-${plan.color}-500/20 relative transition-all hover:scale-[1.02] ${plan.popular ? 'border-cyan-500/50 shadow-[0_0_40px_rgba(34,211,238,0.1)] md:scale-110 z-10 mt-12 md:mt-0' : ''}`}>
                    
                    {plan.popular && (
                      <div className="absolute -top-16 md:-top-20 left-1/2 -translate-x-1/2 flex flex-col items-center">
                        <div className="relative group">
                          <div className="absolute inset-0 bg-cyan-500 blur-xl opacity-40 rounded-full group-hover:opacity-60 transition-opacity duration-500"></div>
                          <div className="w-24 h-24 md:w-32 md:h-32 rounded-full p-1 bg-gradient-to-b from-cyan-400 to-blue-600 shadow-2xl relative z-10">
                            <img 
                              src="https://raw.githubusercontent.com/strongestrotiv/Jotgin/refs/heads/main/WhatsApp%20Image%202026-04-07%20at%2009.23.14%20(2).jpeg" 
                              alt="Tech Chihuahua Premium"
                              className="w-full h-full object-cover rounded-full border-4 border-[#0a0f1c]" 
                            />
                          </div>
                        </div>
                        <div className="bg-cyan-500 text-slate-950 text-[10px] md:text-xs font-black px-4 py-1.5 rounded-full tracking-widest -mt-4 relative z-20 shadow-xl border-2 border-[#0a0f1c]">
                          MAIS VENDIDO
                        </div>
                      </div>
                    )}

                    <h3 className={`text-2xl font-bold mb-2 ${plan.popular ? 'mt-10 md:mt-12 text-center' : ''}`}>{plan.title}</h3>
                    <div className={`mb-8 ${plan.popular ? 'text-center' : ''}`}>
                      <div>
                        <span className="text-4xl font-black text-white">R$ {plan.price}</span>
                        <span className="text-slate-500 ml-2">à vista</span>
                      </div>
                      <p className="text-sm font-bold text-emerald-400 mt-2">
                        ou 12x de R$ {plan.installment} sem juros
                      </p>
                    </div>
                    <ul className="space-y-4 mb-10 flex-1">
                      {plan.features.map((f, j) => (
                        <li key={j} className="flex items-center gap-3 text-slate-300">
                          <CheckCircle size={18} className={`text-${plan.color}-400 shrink-0`} /> {f}
                        </li>
                      ))}
                    </ul>
                    <button className={`w-full py-4 rounded-2xl font-bold transition-all ${plan.popular ? 'bg-cyan-500 text-slate-950 hover:bg-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.3)]' : 'bg-white/5 hover:bg-white/10 text-white border border-white/10'}`}>
                      Reservar agora
                    </button>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );

        const SectionFooter = () => (
          <section className="w-full h-full flex flex-col items-center justify-center bg-slate-950 px-6 md:px-16 text-center">
            <div className="max-w-4xl glass-panel p-10 md:p-20 rounded-[60px] border-white/5 shadow-2xl relative">
              <div className="absolute -top-12 left-1/2 -translate-x-1/2">
                <img src="https://raw.githubusercontent.com/strongestrotiv/Jotgin/refs/heads/main/cb4513a3-8143-43c8-98ad-789ef3025e5f.jfif" className="w-24 h-24 rounded-full border-4 border-cyan-500 shadow-2xl animate-pulse-soft" />
              </div>
              <h2 className="text-4xl md:text-7xl font-black mb-6">Pronto para a evolução?</h2>
              <p className="text-xl text-slate-400 mb-10">O primeiro lote será enviado em 30 dias. Não fique de fora da revolução tecnológica canina.</p>
              <button className="px-12 py-5 rounded-3xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold text-2xl shadow-2xl hover:scale-105 transition-all">
                Falar com a Equipa
              </button>
              <div className="mt-16 grid grid-cols-1 md:grid-cols-3 gap-6 text-sm text-slate-500 border-t border-white/10 pt-8">
                <span>© 2026 Canivilu Tech</span>
                <span>Termos e Privacidade</span>
                <span className="text-cyan-400 font-bold">contacto@canivilu.com</span>
              </div>
            </div>
          </section>
        );

        // --- Splash Screen ---

        function SplashScreen({ onComplete }) {
          const [step, setStep] = useState(0);

          return (
            <div className="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-6 transition-all duration-700">
              <div className="max-w-md w-full glass-panel p-10 rounded-[40px] border-cyan-500/20 text-center shadow-2xl">
                {step === 0 ? (
                  <div className="animate-in fade-in zoom-in duration-500">
                    <Heart className="text-pink-500 mx-auto mb-6 animate-bounce" size={60} fill="currentColor" />
                    <h2 className="text-3xl font-black mb-8 text-white">Olá! Antes de entrar... <br/><span className="text-cyan-400">Você gosta de pets?</span></h2>
                    <div className="flex gap-4">
                      <button 
                        onClick={() => setStep(1)} 
                        className="flex-1 py-4 rounded-2xl bg-cyan-500 text-slate-950 font-black text-xl hover:scale-105 transition-all"
                      >
                        SIM! ❤️
                      </button>
                      <button 
                        onClick={() => setStep(2)} 
                        className="flex-1 py-4 rounded-2xl bg-slate-800 text-slate-400 font-bold hover:bg-slate-700 transition-all"
                      >
                        Não muito...
                      </button>
                    </div>
                  </div>
                ) : step === 1 ? (
                  <div className="animate-in slide-in-from-bottom duration-500">
                    <Sparkles className="text-cyan-400 mx-auto mb-6" size={60} />
                    <h2 className="text-3xl font-black mb-4">Incrível!</h2>
                    <p className="text-slate-300 text-lg mb-8">Preparamos uma tecnologia que une a inteligência artificial com o amor pelos animais.</p>
                    <button onClick={onComplete} className="w-full py-4 rounded-2xl bg-white text-slate-950 font-black text-xl animate-pulse">
                      VER PROPOSTA
                    </button>
                  </div>
                ) : (
                  <div className="animate-in slide-in-from-bottom duration-500">
                    <MousePointer2 className="text-slate-400 mx-auto mb-6" size={60} />
                    <h2 className="text-2xl font-black mb-4">Sem problemas!</h2>
                    <p className="text-slate-300 text-lg mb-8">A Canivilu foca 100% em <b>performance profissional</b>. O design de pet é apenas um bônus de discrição.</p>
                    <button onClick={onComplete} className="w-full py-4 rounded-2xl bg-cyan-500 text-slate-950 font-black text-xl">
                      ACESSAR TOOLS
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // --- App Principal ---

        function App() {
          const [showSplash, setShowSplash] = useState(true);
          const [currentSlide, setCurrentSlide] = useState(0);
          const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
          const [isLocked, setIsLocked] = useState(false);
          const touchStart = useRef(null);

          const slides = [
            { id: 'hero', name: 'Início', component: <SectionHero goToPrecos={() => goToSlide(6)} goToSolucao={() => goToSlide(1)} /> },
            { id: 'problema', name: 'Problema', component: <SectionProblema /> },
            { id: 'professores', name: 'Ensino', component: <SectionProfessores /> },
            { id: 'marceneiros', name: 'Oficina', component: <SectionMarceneiros /> },
            { id: 'upgrade', name: 'BrainUpgrade', component: <SectionBrainUpgrade /> },
            { id: 'precos', name: 'Preços', component: <SectionPrecos /> },
            { id: 'footer', name: 'Contacto', component: <SectionFooter /> }
          ];

          const goToSlide = (index) => {
            if (index < 0 || index >= slides.length || isLocked) return;
            setIsLocked(true);
            setCurrentSlide(index);
            setMobileMenuOpen(false);
            setTimeout(() => setIsLocked(false), 800);
          };

          const handleWheel = useCallback((e) => {
            if (isLocked || showSplash) return;
            if (Math.abs(e.deltaY) > 50) {
              if (e.deltaY > 0) goToSlide(currentSlide + 1);
              else goToSlide(currentSlide - 1);
            }
          }, [currentSlide, isLocked, showSplash]);

          const handleKeyDown = useCallback((e) => {
            if (isLocked || showSplash) return;
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') goToSlide(currentSlide + 1);
            if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') goToSlide(currentSlide - 1);
          }, [currentSlide, isLocked, showSplash]);

          useEffect(() => {
            window.addEventListener('wheel', handleWheel, { passive: false });
            window.addEventListener('keydown', handleKeyDown);
            return () => {
              window.removeEventListener('wheel', handleWheel);
              window.removeEventListener('keydown', handleKeyDown);
            };
          }, [handleWheel, handleKeyDown]);

          const handleTouchStart = (e) => { touchStart.current = e.touches[0].clientY; };
          const handleTouchEnd = (e) => {
            if (!touchStart.current) return;
            const touchEnd = e.changedTouches[0].clientY;
            const diff = touchStart.current - touchEnd;
            if (Math.abs(diff) > 50) {
              if (diff > 0) goToSlide(currentSlide + 1);
              else goToSlide(currentSlide - 1);
            }
            touchStart.current = null;
          };

          if (showSplash) return <SplashScreen onComplete={() => setShowSplash(false)} />;

          return (
            <div 
              className="h-screen w-screen overflow-hidden bg-slate-950 text-slate-200 selection:bg-cyan-500/30 relative"
              onTouchStart={handleTouchStart}
              onTouchEnd={handleTouchEnd}
            >
              {/* Barra de Navegação */}
              <nav className="fixed top-0 w-full z-50 glass-panel py-4 px-6">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-3 cursor-pointer group" onClick={() => goToSlide(0)}>
                    <div className="relative">
                      <img src="https://raw.githubusercontent.com/strongestrotiv/Jotgin/refs/heads/main/cb4513a3-8143-43c8-98ad-789ef3025e5f.jfif" className="w-10 h-10 rounded-full border border-cyan-500 object-cover group-hover:scale-110 transition-transform" />
                      <div className="absolute inset-0 rounded-full border border-cyan-400 animate-ping opacity-20"></div>
                    </div>
                    <span className="text-xl font-black tracking-tighter text-white">CANIVILU</span>
                  </div>
                  
                  <div className="hidden md:flex items-center gap-8">
                    {slides.slice(1, -1).map((s, i) => (
                      <button 
                        key={s.id} 
                        onClick={() => goToSlide(i + 1)} 
                        className={`text-sm font-bold transition-all uppercase tracking-widest ${currentSlide === i + 1 ? 'text-cyan-400' : 'text-slate-400 hover:text-white'}`}
                      >
                        {s.name}
                      </button>
                    ))}
                    <button onClick={() => goToSlide(5)} className="px-5 py-2 rounded-xl bg-cyan-500 text-slate-950 font-black text-xs tracking-widest hover:bg-cyan-400 transition-all">
                      RESERVAR
                    </button>
                  </div>

                  <button className="md:hidden text-white" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                    {mobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                  </button>
                </div>

                {/* Menu Mobile */}
                {mobileMenuOpen && (
                  <div className="md:hidden absolute top-full left-0 w-full glass-panel border-t border-white/10 p-6 flex flex-col gap-4 animate-in slide-in-from-top duration-300">
                    {slides.map((s, i) => (
                      <button key={s.id} onClick={() => goToSlide(i)} className="text-left text-lg font-bold py-2 border-b border-white/5">{s.name}</button>
                    ))}
                  </div>
                )}
              </nav>

              {/* Indicador de Progresso Lateral */}
              <div className="fixed right-6 top-1/2 -translate-y-1/2 z-40 hidden md:flex flex-col gap-4">
                {slides.map((_, i) => (
                  <button 
                    key={i} 
                    onClick={() => goToSlide(i)}
                    className={`w-1.5 transition-all duration-500 rounded-full ${i === currentSlide ? 'h-10 bg-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.8)]' : 'h-1.5 bg-slate-700 hover:bg-slate-500'}`}
                  />
                ))}
              </div>

              {/* Área dos Slides */}
              <main className="h-full w-full relative">
                {slides.map((slide, index) => (
                  <div 
                    key={slide.id}
                    className={`absolute inset-0 w-full h-full transition-all duration-700 ease-[cubic-bezier(0.22,1,0.36,1)] pt-16
                      ${index === currentSlide ? 'opacity-100 translate-y-0 z-10' : 
                        index < currentSlide ? 'opacity-0 -translate-y-20 z-0' : 'opacity-0 translate-y-20 z-0'}`}
                  >
                    <div className={`h-full w-full transition-all duration-1000 delay-300 ${index === currentSlide ? 'scale-100' : 'scale-90 opacity-0'}`}>
                      {slide.component}
                    </div>
                  </div>
                ))}
              </main>

              {/* Footer de Navegação (Mobile) */}
              <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 flex md:hidden items-center gap-4 glass-panel px-6 py-3 rounded-full border-white/10">
                <button onClick={() => goToSlide(currentSlide - 1)} className="p-2 text-slate-400 disabled:opacity-20" disabled={currentSlide === 0}><ChevronLeft size={24}/></button>
                <span className="font-black text-cyan-400 text-sm">{currentSlide + 1} / {slides.length}</span>
                <button onClick={() => goToSlide(currentSlide + 1)} className="p-2 text-slate-400 disabled:opacity-20" disabled={currentSlide === slides.length - 1}><ChevronRight size={24}/></button>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
